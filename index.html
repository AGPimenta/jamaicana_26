h+='<h2>Principais demandas em atraso ('+D.kpi.atraso+')</h2><div class="card"><table><tr><th>Urg.</th><th>Responsável</th><th>Projeto</th><th>Item</th><th>Prazo</th><th class="right">Atraso</th></tr>';
if(!D.atrasos.length)h+='<tr><td colspan="6" class="muted">Nenhuma demanda em atraso 🎉</td></tr>';
D.atrasos.forEach(function(it,i){h+='<tr class="click" data-atr="'+i+'"><td><span class="pill" style="background:'+D.cores[it.cor]+';color:'+(it.cor=="AMARELO"||it.cor=="BRANCO"||it.cor=="SEM_COR"?"#1f2430":"#fff")+'">'+D.emoji[it.cor]+'</span></td><td>'+esc(it.responsavel)+'</td><td>'+esc(it.projeto)+'</td><td>'+esc(it.item)+'</td><td>'+esc(it.prazo)+'</td><td class="right b" style="color:#C00000">'+(-it.dias)+'d</td></tr>';});
h+='</table></div>';
h+='<h2>Legenda de cores</h2><div class="card"><div class="legend">'+['PRETO','VERMELHO','LARANJA','AMARELO','BRANCO','VERDE'].map(function(c){return '<span class="chip" style="background:'+D.cores[c]+';color:'+(c=="AMARELO"||c=="BRANCO"?"#1f2430":"#fff")+'">'+D.emoji[c]+' '+esc(D.rotulos[c])+'</span>';}).join('')+'</div></div>';
h+='<div class="sub" style="margin-top:16px">Gerado pelo motor da Automação Jamaicana · base no OneDrive em '+esc(D.hoje)+'.</div>';
document.getElementById('app').innerHTML=h;desenharGraficos();}
function desenharGraficos(){var D=window.DADOS;if(!window.Chart)return;if(chU)chU.destroy();if(chR)chR.destroy();
var cu=document.getElementById('cu');if(cu)chU=new Chart(cu,{type:'doughnut',data:{labels:D.chart_urg.labels,datasets:[{data:D.chart_urg.data,backgroundColor:D.chart_urg.colors,borderWidth:1}]},options:{plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:11}}}}}});
var cr=document.getElementById('cr');if(cr)chR=new Chart(cr,{type:'bar',data:{labels:D.chart_resp.labels,datasets:[{label:'Pendentes',data:D.chart_resp.data,backgroundColor:'#1F3864'}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{precision:0}}}}});}
function openModal(t,b){document.getElementById('mtit').innerHTML=t;document.getElementById('mbody').innerHTML=b;document.getElementById('modalbg').classList.add('show');}
function closeModal(){document.getElementById('modalbg').classList.remove('show');}
document.getElementById('mx').onclick=closeModal;document.getElementById('modalbg').onclick=function(e){if(e.target===this)closeModal();};
function itemDetalhe(it){var D=window.DADOS;var cor=D.cores[it.cor],fg=(it.cor=="AMARELO"||it.cor=="BRANCO"||it.cor=="SEM_COR")?"#1f2430":"#fff";
var prazo=it.prazo?esc(it.prazo)+(it.dias!=null?(it.dias<0?' ('+(-it.dias)+'d em atraso)':' (em '+it.dias+'d)'):''):'sem prazo';
var b='<div class="kv"><div class="k">Projeto</div><div class="b">'+esc(it.projeto)+'</div>';
b+='<div class="k">Responsável</div><div>'+esc(it.responsavel)+'</div>';
b+='<div class="k">Etapa</div><div>'+(esc(it.etapa)||'—')+'</div>';
b+='<div class="k">Prazo</div><div>'+prazo+'</div>';
b+='<div class="k">Status</div><div><span class="pill" style="background:'+cor+';color:'+fg+'">'+D.emoji[it.cor]+' '+esc(D.rotulos[it.cor])+'</span></div></div>';
b+='<div class="k" style="color:var(--mut);font-size:12px;margin-bottom:4px">DESCRIÇÃO</div><div class="obs">'+(esc(it.descricao)||'—')+'</div>';
b+='<div class="k" style="color:var(--mut);font-size:12px;margin:12px 0 4px">ANDAMENTO (OBS / TIMELINE)</div><div class="obs">'+(esc(it.obs)||'—')+'</div>';
var doc=(D.docs&&D.docs[it.projeto])||'';if(doc)b+='<a class="docbtn" href="'+esc(doc)+'" target="_blank">📄 Abrir DOC de Fechamento</a>';
openModal(esc(it.item),b);}
function openProjeto(i){var p=window.DADOS.projetos[i];var b='<div class="sub" style="margin-bottom:10px">Cliente: <b>'+(esc(p.cliente)||'—')+'</b> · Gestor: '+(esc(p.gestor)||'—')+' · Pendentes: <b>'+p.pend+'</b> · Concluídas: '+p.conc+'</div>';
if(!p.itens.length)b+='<div class="muted">Sem itens pendentes 🎉</div>';
p.itens.forEach(function(it,j){var D=window.DADOS;b+='<div class="itemrow" data-pi="'+i+'_'+j+'"><div><span class="pill" style="background:'+D.cores[it.cor]+';color:'+(it.cor=="AMARELO"||it.cor=="BRANCO"||it.cor=="SEM_COR"?"#1f2430":"#fff")+'">'+D.emoji[it.cor]+'</span> <b>'+esc(it.item)+'</b> <span class="muted">· '+esc(it.responsavel)+'</span></div><div class="muted">'+(it.prazo?esc(it.prazo):'sem prazo')+'</div></div>';});
var doc=(window.DADOS.docs&&window.DADOS.docs[p.nome])||'';if(doc)b+='<a class="docbtn" href="'+esc(doc)+'" target="_blank">📄 Abrir DOC de Fechamento</a>';
openModal('Projeto: '+esc(p.nome),b);}
document.addEventListener('click',function(e){var t=e.target.closest('[data-proj],[data-atr],[data-pi]');if(!t)return;
if(t.hasAttribute('data-proj'))openProjeto(+t.getAttribute('data-proj'));
else if(t.hasAttribute('data-atr'))itemDetalhe(window.DADOS.atrasos[+t.getAttribute('data-atr')]);
else if(t.hasAttribute('data-pi')){var a=t.getAttribute('data-pi').split('_');itemDetalhe(window.DADOS.projetos[+a[0]].itens[+a[1]]);}});
function checar(){fetch(location.pathname+'?_='+Date.now(),{cache:'no-store'}).then(function(r){return r.text();}).then(function(txt){var m=txt.match(/window\.DADOS = ([\s\S]*?) \/\*FIM\*\//);if(!m)return;var nd;try{nd=JSON.parse(m[1]);}catch(e){return;}if(nd.gen!==window.DADOS.gen){window.DADOS=nd;render();if(somOn)beep();}}).catch(function(){});}
render();setInterval(checar,180000);
</script></body></html>
