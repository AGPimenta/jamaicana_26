function bar(urg){var D=window.DADOS,t=0;for(var k in urg)t+=urg[k];if(!t)return '<div class="bar"></div>';var s='';D.ordem.forEach(function(k){var n=urg[k]||0;if(!n)return;s+='<span style="width:'+(n*100/t).toFixed(1)+'%;background:'+D.cores[k]+'" title="'+esc(D.rotulos[k])+': '+n+'"></span>';});return '<div class="bar">'+s+'</div>';}
function fmtPrazo(p){if(!p.prox)return '<span class="muted">sem prazo</span>';var d=p.dias;return p.prox+(d<0?' · <b style="color:#D32F2F">'+(-d)+'d atraso</b>':' · em '+d+'d');}
function render(){var D=window.DADOS;document.getElementById('gen').innerHTML='Atualizado em <b>'+esc(D.gen)+'</b> · checa atualização a cada 3 min';

h+='<div class="grid2" style="margin-top:14px"><div class="card"><h3>Pendentes por urgência</h3><canvas id="cu" height="150"></canvas></div><div class="card"><h3>Pendências por responsável (top 10)</h3><canvas id="cr" height="150"></canvas></div></div>';

h+='<h2>Demandas por responsável (quantidade e % por status)</h2><div class="card"><table><tr><th>Responsável</th><th class="right">Total</th><th class="right">Pend.</th><th class="right">Atraso</th><th class="right">Concl.</th><th style="width:32%">% por status</th></tr>';
D.responsaveis.forEach(function(r){var at=r.atras?'<span class="pill" style="background:#fde8e8;color:#C00000">'+r.atras+'</span>':'0';var sc=r.sem_contato?' <span class="muted">(s/ contato)</span>':'';h+='<tr><td class="b">'+esc(r.nome)+sc+'</td><td class="right">'+r.total+'</td><td class="right">'+r.pend+'</td><td class="right">'+at+'</td><td class="right">'+r.conc+' <span class="muted">('+r.pct+'%)</span></td><td>'+bar(r.urg)+'</td></tr>';});

if(!D.atrasos.length)h+='<tr><td colspan="6" class="muted">Nenhuma demanda em atraso 🎉</td></tr>';
